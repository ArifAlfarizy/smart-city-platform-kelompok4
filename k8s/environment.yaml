apiVersion: apps/v1
kind: Deployment

metadata:
  name: environment-service
  namespace: smartcity

spec:
  replicas: 1

  selector:
    matchLabels:
      app: environment-service

  template:
    metadata:
      labels:
        app: environment-service

    spec:
      containers:
      - name: environment-service

        image: smart-city-platform-kelompok4-environment-service
        imagePullPolicy: Never

        ports:
        - containerPort: 8002

        env:

        - name: DB_HOST
          value: mysql

        - name: DB_PORT
          value: "3306"

        - name: DB_NAME
          value: smartcity

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: MYSQL_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: MYSQL_PASSWORD

        - name: RABBITMQ_HOST
          value: rabbitmq

        - name: RABBITMQ_PORT
          value: "5672"

        - name: RABBITMQ_USER
          value: guest

        - name: RABBITMQ_PASSWORD
          value: guest

        - name: RABBITMQ_VHOST
          value: "/"

        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: JWT_ACCESS_SECRET

        - name: APP_ENV
          value: production

        - name: APP_DEBUG
          value: "false"

        - name: TZ
          value: Asia/Jakarta

        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 40
          periodSeconds: 20

---
apiVersion: v1
kind: Service

metadata:
  name: environment-service
  namespace: smartcity

spec:

  selector:
    app: environment-service

  ports:
  - port: 8002
    targetPort: 8002

  type: ClusterIP
