# k8s/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartcity-config
  namespace: smartcity
data:
  # App
  APP_ENV: "production"
  APP_PORT: "5000"

  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  RABBITMQ_EXCHANGE: "city.events"

  # Database
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "smartcity"
  DB_USER: "root"

  # Model
  MODEL_PATH: "models/smartcity_models.pkl"