apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: smartcity

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-service

  template:

    metadata:
      labels:
        app: auth-service

    spec:

      containers:

      - name: auth-service

        image: smart-city-platform-kelompok4-auth-service

        imagePullPolicy: Never

        ports:
        - containerPort: 3002

        env:

        - name: PORT
          value: "3002"

        - name: DB_HOST
          value: "mysql"

        - name: DB_PORT
          value: "3306"

        - name: DB_NAME
          value: "smartcity"

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: MYSQL_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: MYSQL_PASSWORD

        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: JWT_ACCESS_SECRET

        - name: JWT_ACCESS_EXPIRES_IN
          value: "86400"

        - name: SALT_ROUNDS
          value: "10"

        - name: TZ
          value: "Asia/Jakarta"

---
apiVersion: v1

kind: Service

metadata:
  name: auth-service
  namespace: smartcity

spec:

  selector:
    app: auth-service

  ports:

  - port: 3002
    targetPort: 3002

  type: ClusterIP
