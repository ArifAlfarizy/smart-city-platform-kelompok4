apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ml
  namespace: smartcity
  labels:
    app: python-ml
    tier: ml
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ml
  template:
    metadata:
      labels:
        app: python-ml
        tier: ml
    spec:
      containers:
        - name: python-ml
          image: smartcity/python-ml:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http

          # Environment dari ConfigMap & Secret
          envFrom:
            - configMapRef:
                name: smartcity-config
            - secretRef:
                name: smartcity-secrets

          # Resource Requests & Limits
          resources:
            requests:
              cpu: "200m"       # 0.2 core minimum
              memory: "256Mi"   # 256MB minimum
            limits:
              cpu: "1000m"      # 1 core maksimum
              memory: "1Gi"     # 1GB maksimum

          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30 
            periodSeconds: 10
            failureThreshold: 3

          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60 
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: python-ml-svc
  namespace: smartcity
  labels:
    app: python-ml
spec:
  selector:
    app: python-ml
  ports:
    - name: http
      port: 80
      targetPort: 5000
      protocol: TCP
  type: ClusterIP