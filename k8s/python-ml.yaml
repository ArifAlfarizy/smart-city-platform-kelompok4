apiVersion: apps/v1
kind: Deployment

metadata:
  name: python-ml
  namespace: smartcity

spec:
  replicas: 1

  selector:
    matchLabels:
      app: python-ml

  template:
    metadata:
      labels:
        app: python-ml

    spec:
      containers:
      - name: python-ml

        image: smart-city-platform-kelompok4-python-ml
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:

        - name: APP_ENV
          value: production

        - name: APP_PORT
          value: "5000"

        - name: DB_HOST
          value: mysql

        - name: DB_PORT
          value: "3306"

        - name: DB_NAME
          value: smartcity

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: MYSQL_USER

        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: MYSQL_PASSWORD

        - name: RABBITMQ_HOST
          value: rabbitmq

        - name: RABBITMQ_PORT
          value: "5672"

        - name: RABBITMQ_USER
          value: guest

        - name: RABBITMQ_PASS
          value: guest

        - name: RABBITMQ_EXCHANGE
          value: city.events

        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: JWT_ACCESS_SECRET

        - name: MODEL_PATH
          value: models/smartcity_models.pkl

        - name: VOLUME_MODEL_PATH
          value: models/volume_model.pkl

        - name: RISK_MODEL_PATH
          value: models/risk_model.pkl

        - name: TZ
          value: Asia/Jakarta

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 120
          periodSeconds: 20

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 150
          periodSeconds: 30

---
apiVersion: v1
kind: Service

metadata:
  name: python-ml
  namespace: smartcity

spec:

  selector:
    app: python-ml

  ports:
  - port: 5000
    targetPort: 5000

  type: ClusterIP
