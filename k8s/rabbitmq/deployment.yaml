apiVersion: apps/v1
kind: Deployment

metadata:
  name: rabbitmq
  namespace: smartcity

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rabbitmq

  template:

    metadata:
      labels:
        app: rabbitmq

    spec:

      containers:

      - name: rabbitmq

        image: rabbitmq:3.12-management-alpine

        ports:

        - containerPort: 5672

        - containerPort: 15672

        env:

        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: RABBITMQ_DEFAULT_USER

        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: smart-city-secret
              key: RABBITMQ_DEFAULT_PASS

        volumeMounts:

        - name: rabbitmq-storage
          mountPath: /var/lib/rabbitmq

      volumes:

      - name: rabbitmq-storage

        persistentVolumeClaim:
          claimName: rabbitmq-pvc
