# ================================================================
# SMART CITY PLATFORM - Full Stack Docker Compose
# PORT MAPPING: Kelompok 4 (semua port diakhiri 40)
# ================================================================
services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    platform: linux/amd64
    command: --skip-host-cache --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: smartcity
      MYSQL_USER: env_user
      MYSQL_PASSWORD: env_secret
      TZ: Asia/Jakarta
    ports:
      - "3340:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -prootpass || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - smartcity-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Jakarta
    ports:
      - "5640:5672"
      - "15640:15672"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - smartcity-net
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1840:1883"
    volumes:
      - ./iot/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      TZ: Asia/Jakarta
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # AUTH & GATEWAY
  # ============================================================

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "3042:3002"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      PORT: 3002
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_USER: env_user
      DB_PASSWORD: env_secret
      DB_NAME: smartcity
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-accessrahasia_super_secret_min_32_chars}
      JWT_ACCESS_EXPIRES_IN: 1728000
      SALT_ROUNDS: 10
      TZ: Asia/Jakarta
    depends_on:
      mysql_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - smartcity-net
    restart: unless-stopped

  api-gateway:
    build:
      context: ./express-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3040:3000"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3002
      TRAFFIC_SERVICE_URL: http://traffic-service:8001
      ENVIRONMENT_SERVICE_URL: http://environment-service:8002
      CITIZEN_SERVICE_URL: http://citizen-service:8080
      ML_SERVICE_URL: http://python-ml:5000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-accessrahasia_super_secret_min_32_chars}
      TZ: Asia/Jakarta
    depends_on:
      auth-service:
        condition: service_healthy
      environment-service:
        condition: service_healthy
      traffic-service:
        condition: service_started
      citizen-service:
        condition: service_started
      python-ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # ENVIRONMENT SERVICE (PHP Slim)
  # ============================================================

  environment-service:
    build:
      context: ./php-environment
      dockerfile: Dockerfile
    container_name: environment-service
    ports:
      - "8042:8002"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: smartcity
      DB_USER: env_user
      DB_PASSWORD: env_secret
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-accessrahasia_super_secret_min_32_chars}
      APP_ENV: production
      APP_DEBUG: "false"
      TZ: Asia/Jakarta
    depends_on:
      mysql_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # TRAFFIC SERVICE (PHP)
  # ============================================================

  traffic-service:
    build:
      context: ./php-traffic
      dockerfile: Dockerfile
    container_name: traffic-service
    ports:
      - "8041:8001"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: smartcity
      DB_USER: env_user
      DB_PASSWORD: env_secret
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      TZ: Asia/Jakarta
    depends_on:
      mysql_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - smartcity-net
    restart: unless-stopped

  traffic-worker:
    build:
      context: ./php-traffic
      dockerfile: Dockerfile.worker
    container_name: traffic-worker
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: smartcity
      DB_USER: env_user
      DB_PASSWORD: env_secret
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      TZ: Asia/Jakarta
    depends_on:
      mysql_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # CITIZEN SERVICE (PHP CodeIgniter)
  # ============================================================

  citizen-service:
    build:
      context: ./php-citizen
      dockerfile: Dockerfile
    container_name: citizen-service
    ports:
      - "8040:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      CI_ENVIRONMENT: production
      database.default.hostname: mysql_db
      database.default.database: smartcity
      database.default.username: env_user
      database.default.password: env_secret
      database.default.DBDriver: MySQLi
      database.default.port: 3306
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-accessrahasia_super_secret_min_32_chars}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      RABBITMQ_EXCHANGE: city.events
      TZ: Asia/Jakarta
    depends_on:
      mysql_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # PYTHON ML SERVICE
  # ============================================================

  python-ml:
    build:
      context: ./python-ml-service
      dockerfile: Dockerfile
    container_name: python-ml
    ports:
      - "5040:5000"
    volumes:
      - ./python-ml-service/models:/app/models
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      APP_ENV: production
      APP_PORT: 5000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      RABBITMQ_EXCHANGE: city.events
      DB_HOST: mysql_db
      DB_PORT: 3306
      DB_NAME: smartcity
      DB_USER: env_user
      DB_PASS: env_secret
      JWT_SECRET: ${JWT_ACCESS_SECRET:-accessrahasia_super_secret_min_32_chars}
      MODEL_PATH: models/smartcity_models.pkl
      VOLUME_MODEL_PATH: models/volume_model.pkl
      RISK_MODEL_PATH: models/risk_model.pkl
      TZ: Asia/Jakarta
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # NODE-RED - IoT Bridge
  # ============================================================

  node-red:
    image: nodered/node-red:3.1
    container_name: node-red
    ports:
      - "1884:1880"
    volumes:
      - ./iot/node-red-data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - NODE_RED_ENABLE_SAFE_MODE=false
      - TZ=Asia/Jakarta
    depends_on:
      - mosquitto
      - api-gateway
    networks:
      - smartcity-net
    restart: unless-stopped

  # ============================================================
  # MONITORING (Optional - Bonus)
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9040:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - smartcity-net
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3041:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=Asia/Jakarta
    networks:
      - smartcity-net
    restart: unless-stopped
    profiles:
      - monitoring

# ============================================================
# VOLUMES
# ============================================================

volumes:
  mysql_data:
  grafana_data:

# ============================================================
# NETWORKS
# ============================================================

networks:
  smartcity-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
